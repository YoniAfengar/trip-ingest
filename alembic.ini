# Alembic config. Given — do not edit.
#
# The database URL is deliberately NOT here. `alembic/env.py` reads it from DATABASE_URL, so the same
# revisions run against your laptop, the container, and CI without editing this file or committing a
# password.
[alembic]
script_location = alembic

# Timestamped, slugged filenames so the directory listing reads chronologically. Note that the
# *ordering that matters* is not this one — see `down_revision` in each revision file.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

path_separator = os
prepend_sys_path = src

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
